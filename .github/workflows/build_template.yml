name: Visual Studio Template

permissions:
  contents: read
  packages: write
  id-token: write

on:
  push:
    branches: [ main ]
    paths:
      - 'templates/projects/Shark.Fido2.VisualStudio.Template/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      CI: true # Enable deterministic builds
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      FIDO2_GITHUB_PAT: ${{ secrets.FIDO2_GITHUB_PAT }}
      NUGET_USER: ${{ vars.NUGET_USERNAME }}

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore templates/projects/Shark.Fido2.VisualStudio.Template/Shark.Fido2.VisualStudio.Template.csproj

    - name: Build
      run: dotnet build templates/projects/Shark.Fido2.VisualStudio.Template/Shark.Fido2.VisualStudio.Template.csproj --configuration Release --no-restore

    - name: Pack
      run: dotnet pack templates/projects/Shark.Fido2.VisualStudio.Template/Shark.Fido2.VisualStudio.Template.csproj --configuration Release --no-restore --output ./out /p:Version=1.4.1.${{ github.run_number }}

    - name: Upload Artifact
      uses: actions/upload-artifact@v6
      with:
        name: Shark.Fido2.VisualStudio.Template
        path: out/*.nupkg

    - name: Add nuget source
      run: dotnet nuget add source --username ${{ vars.NUGET_USERNAME }} --password $GITHUB_TOKEN --store-password-in-clear-text --name github "https://nuget.pkg.github.com/${{ vars.NUGET_USERNAME }}/index.json"

    - name: Push packages to github.com
      run: dotnet nuget push "./out/*.nupkg" --api-key $FIDO2_GITHUB_PAT --source "github" --skip-duplicate --no-symbols

    - name: Login to nuget.org
      uses: NuGet/login@d22cc5f58ff5b88bf9bd452535b4335137e24544 #v1
      id: nuget-login
      with:
        user: ${{ env.NUGET_USER }}

    - name: Push packages to nuget.org
      run: dotnet nuget push "./out/*.nupkg" --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate --no-symbols
